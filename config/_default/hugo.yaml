######################## default configuration ####################
# Your theme name
theme: "dot-org-hugo-theme"
# Title of your website (required).
title: "We Like Good Neighbors"
# Default time zone for time stamps; use any valid tz database name: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List
timeZone: "America/Chicago"
# Defines the minimum amount of words to reddened in a summary
summaryLength: 50

locale: en-us
hasCJKLanguage: false

copyright: "We want to hear from you. Email us at welikegoodneighbors@gmail.com with questions, ideas, or to get connected with neighbors near you."

######################## calls to action ####################
params:
  description: "The Freret neighbors united in opposition to live music at the Josephine"
  main_cta:
    text: "Join"
    link: "/join/"
  footer_cta:
    text: "Join us"
    link: "/join/"

######################## menus ####################
menu:
  main:
  - identifier: "about"
    name: "About"
    url: "/about/"
    weight: 1
  - identifier: "proposal"
    name: "Our Community Proposal"
    url: "/proposal/"
    weight: 2

######################## privacy & speed ####################
# Enable do not track, no cookies on Video embeds
privacy:
  youtube:
    privacyEnhanced: true
  vimeo:
    enableDNT: true

markup:
  goldmark:
    renderer:
      unsafe: true
